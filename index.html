<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antojitos - Control de Ventas</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --card: #ffffff;
            --accent: #1abc9c;
            --yape: #9b59b6;
            --text: #2c3e50;
            --border: #dcdde1;
            --danger: #e74c3c;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            width: 100%;
            max-width: 450px; 
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        h2, h3 { 
            color: var(--accent); 
            margin: 5px 0 15px 0; 
            text-align: center; 
            font-weight: 600;
        }

        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .grid-productos { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            width: 100%;
        }
        
        .item-box { 
            background: #fff; 
            border-radius: 15px; 
            padding: 10px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            border: 1px solid var(--border);
        }

        .info-btn { 
            width: 100%;
            background: none; 
            border: none; 
            color: var(--text); 
            cursor: pointer; 
            text-align: center; 
            padding: 5px; 
        }
        .info-btn b { display: block; font-size: 0.95em; }
        .info-btn span { font-size: 0.85em; color: var(--accent); font-weight: bold; }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 8px;
            gap: 10px;
        }

        .btn-qty { 
            width: 32px; 
            height: 32px; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }
        .minus { background: #f1f2f6; color: var(--text); border: 1px solid var(--border); }
        .plus { background: var(--accent); color: white; }
        
        .qty-num { font-weight: bold; min-width: 20px; text-align: center; }

        .preview-bar { 
            width: 100%;
            background: #f9f9f9; 
            padding: 15px; 
            border-radius: 12px; 
            margin: 15px 0; 
            border-bottom: 3px solid var(--accent); 
            display: flex; 
            flex-direction: column;
            gap: 5px;
            box-sizing: border-box;
        }

        .preview-row { display: flex; justify-content: space-between; width: 100%; }

        .pay-grid { display: flex; gap: 10px; width: 100%; margin-bottom: 15px; }
        .pay-btn { 
            flex: 1; padding: 12px; border: 1px solid var(--border); 
            border-radius: 12px; background: #fff; color: var(--text); 
            font-weight: bold; cursor: pointer; 
        }
        .pay-btn.active.efectivo { border-color: var(--accent); color: var(--accent); background: #e8f8f5; }
        .pay-btn.active.yape { border-color: var(--yape); color: var(--yape); background: #f4ecf7; }

        .btn-main { 
            width: 100%; padding: 16px; background: var(--accent); 
            color: white; border: none; border-radius: 15px; 
            font-size: 1.1em; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(26, 188, 156, 0.3);
        }

        .gasto-input { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        input { 
            background: #fff; border: 1px solid var(--border); 
            color: var(--text); padding: 12px; border-radius: 10px; 
            font-size: 1em;
        }

        .resumen-scroll { width: 100%; max-height: 250px; overflow-y: auto; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f2f6; }
        .total-final { font-size: 1.6em; text-align: right; width: 100%; margin-top: 15px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>Nueva Venta</h3>
        <input type="date" id="fecha" style="width: 100%; margin-bottom: 20px; box-sizing: border-box;" onchange="cargarDatos()">
        
        <div class="grid-productos" id="platos-ui"></div>

        <button onclick="adicionalAlPedido()" style="width:100%; margin-top:15px; background:none; border:1px dashed var(--accent); color:var(--accent); padding:10px; border-radius:12px; cursor:pointer; font-weight:500;">+ Agregar Adicional al pedido (S/)</button>

        <div class="preview-bar">
            <div class="preview-row" id="linea-adicional" style="display:none; font-size: 0.9em; color: #7f8c8d; margin-bottom: 5px;">
                <span>Adicional actual:</span>
                <span id="monto-adicional-temp">S/ 0.00</span>
            </div>
            <div class="preview-row">
                <span>Total a cobrar:</span>
                <span id="pedido-total" style="font-weight: bold; color: var(--accent);">S/ 0.00</span>
            </div>
        </div>

        <div class="pay-grid">
            <button class="pay-btn efectivo active" id="btn-efec" onclick="setMetodo('Efectivo')">EFECTIVO</button>
            <button class="pay-btn yape" id="btn-yape" onclick="setMetodo('Yape')">YAPE</button>
        </div>

        <button class="btn-main" onclick="registrar()">REGISTRAR PEDIDO</button>
        <button onclick="deshacer()" id="undo" style="display:none; width:100%; margin-top:12px; background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">↩ Corregir último error</button>
    </div>

    <!-- El resto de las tarjetas (Reporte y Gastos) se mantienen igual -->
    <div class="card">
        <h3>Reporte del Día</h3>
        <div id="reporte-lista" class="resumen-scroll"></div>
        <div style="width: 100%; margin-top: 15px;">
            <div class="row"><span>Efectivo:</span><span id="res-efec">S/ 0.00</span></div>
            <div class="row"><span>Yape:</span><span id="res-yape">S/ 0.00</span></div>
            <div class="row" style="color:var(--danger)"><span>Gastos:</span><span id="res-gastos">S/ 0.00</span></div>
            <div class="total-final" id="res-total">S/ 0.00</div>
        </div>
    </div>

    <div class="card">
        <h3>Gastos Detallados</h3>
        <div class="gasto-input">
            <input type="text" id="g-nombre" placeholder="Descripción">
            <input type="number" id="g-monto" placeholder="Monto S/">
            <button onclick="addGasto()" style="background:var(--danger); border:none; color:white; padding:12px; border-radius:12px; cursor:pointer; font-weight:bold;">Guardar Gasto</button>
        </div>
        <div id="gasto-lista" style="width: 100%; font-size:0.9em; margin-top:15px; color:#7f8c8d"></div>
    </div>
</div>

<script>
    const productos = [
        { id: 'p1', n: "Ejecutivo", p: 16 }, { id: 'p2', n: "Económico 14", p: 14 },
        { id: 'p3', n: "Económico 13", p: 13 }, { id: 'p4', n: "Económico 12", p: 12 },
        { id: 'p5', n: "2do Solo 15", p: 15 }, { id: 'p6', n: "2do Solo 13", p: 13 },
        { id: 'p7', n: "2do Solo 12", p: 12 }, { id: 'p8', n: "Entrada 4", p: 4 }
    ];

    // Adicional temporal para el pedido en curso
    let adicionalTemporal = 0;
    let state = { seleccion: {}, acumulado: {}, efec: 0, yape: 0, gastos: [], last: null };
    let metodoActual = 'Efectivo';

    document.getElementById('fecha').valueAsDate = new Date();

    function init() {
        const ui = document.getElementById('platos-ui');
        productos.forEach(p => {
            state.seleccion[p.id] = 0;
            ui.innerHTML += `
                <div class="item-box">
                    <button class="info-btn" onclick="updateQty('${p.id}', 1)"><b>${p.n}</b><span>S/ ${p.p}</span></button>
                    <div class="controls">
                        <button class="btn-qty minus" onclick="updateQty('${p.id}', -1)">-</button>
                        <span class="qty-num" id="q-${p.id}">0</span>
                        <button class="btn-qty plus" onclick="updateQty('${p.id}', 1)">+</button>
                    </div>
                </div>`;
        });
        cargarDatos();
    }

    function updateQty(id, val) {
        state.seleccion[id] = Math.max(0, state.seleccion[id] + val);
        document.getElementById(`q-${id}`).innerText = state.seleccion[id];
        calcPreview();
    }

    // Nueva función para sumar adicionales al pedido actual
    function adicionalAlPedido() {
        const m = parseFloat(prompt("Monto del adicional para este pedido:"));
        if(!isNaN(m) && m > 0) {
            adicionalTemporal += m;
            document.getElementById('linea-adicional').style.display = 'flex';
            document.getElementById('monto-adicional-temp').innerText = `S/ ${adicionalTemporal.toFixed(2)}`;
            calcPreview();
        }
    }

    function calcPreview() {
        let subtotalPlatos = 0;
        productos.forEach(p => subtotalPlatos += state.seleccion[p.id] * p.p);
        let totalFinal = subtotalPlatos + adicionalTemporal;
        document.getElementById('pedido-total').innerText = `S/ ${totalFinal.toFixed(2)}`;
    }

    function setMetodo(m) {
        metodoActual = m;
        document.getElementById('btn-efec').className = 'pay-btn efectivo' + (m==='Efectivo'?' active':'');
        document.getElementById('btn-yape').className = 'pay-btn yape' + (m==='Yape'?' active':'');
    }

    function registrar() {
        let pedidoItems = [];
        let subtotalPedido = 0;
        
        // Procesar platos
        productos.forEach(p => {
            if(state.seleccion[p.id] > 0) {
                pedidoItems.push({ n: p.n, q: state.seleccion[p.id], p: p.p });
                subtotalPedido += state.seleccion[p.id] * p.p;
                state.acumulado[p.n] = (state.acumulado[p.n] || 0) + state.seleccion[p.id];
                state.seleccion[p.id] = 0; 
                document.getElementById(`q-${p.id}`).innerText = 0;
            }
        });

        // Solo registrar si hay platos o adicionales
        if(pedidoItems.length === 0 && adicionalTemporal === 0) return;

        // Procesar adicional si existe
        if(adicionalTemporal > 0) {
            state.acumulado["Adicionales"] = (state.acumulado["Adicionales"] || 0) + adicionalTemporal;
            subtotalPedido += adicionalTemporal;
        }

        // Sumar a la caja según método
        if(metodoActual === 'Efectivo') state.efec += subtotalPedido; 
        else state.yape += subtotalPedido;

        // Guardar para deshacer (incluyendo el adicional)
        state.last = { items: pedidoItems, sub: subtotalPedido, met: metodoActual, adi: adicionalTemporal };
        
        // Limpiar pedido actual
        adicionalTemporal = 0;
        document.getElementById('linea-adicional').style.display = 'none';
        document.getElementById('undo').style.display = 'block';
        save();
    }

    function addGasto() {
        const n = document.getElementById('g-nombre').value;
        const m = parseFloat(document.getElementById('g-monto').value);
        if(n && m) {
            state.gastos.push({ n, m });
            document.getElementById('g-nombre').value = '';
            document.getElementById('g-monto').value = '';
            save();
        }
    }

    function save() {
        const fecha = document.getElementById('fecha').value;
        localStorage.setItem('caja_'+fecha, JSON.stringify(state));
        updateUI();
    }

    function cargarDatos() {
        const fecha = document.getElementById('fecha').value;
        const data = localStorage.getItem('caja_'+fecha);
        if(data) state = JSON.parse(data);
        else state = { seleccion: {}, acumulado: {}, efec: 0, yape: 0, gastos: [], last: null };
        
        productos.forEach(p => {
            state.seleccion[p.id] = 0;
            const qEl = document.getElementById(`q-${p.id}`);
            if(qEl) qEl.innerText = 0;
        });
        updateUI();
    }

    function updateUI() {
        calcPreview();
        const rep = document.getElementById('reporte-lista');
        rep.innerHTML = '';
        if(Object.keys(state.acumulado).length === 0) rep.innerHTML = '<div style="text-align:center; color:#999; padding:10px;">Sin ventas aún</div>';
        for(const [n, q] of Object.entries(state.acumulado)) {
            rep.innerHTML += `<div class="row"><span>${n}</span><b>${n==="Adicionales"?'S/ ':'x'}${q}</b></div>`;
        }
        
        const gasUI = document.getElementById('gasto-lista');
        let totalG = 0;
        gasUI.innerHTML = '';
        state.gastos.forEach(g => {
            gasUI.innerHTML += `<div class="row" style="border:none; padding:2px 0;"><span>• ${g.n}</span><span>S/ ${g.m.toFixed(2)}</span></div>`;
            totalG += g.m;
        });

        document.getElementById('res-efec').innerText = `S/ ${state.efec.toFixed(2)}`;
        document.getElementById('res-yape').innerText = `S/ ${state.yape.toFixed(2)}`;
        document.getElementById('res-gastos').innerText = `S/ ${totalG.toFixed(2)}`;
        document.getElementById('res-total').innerText = `TOTAL: S/ ${(state.efec + state.yape - totalG).toFixed(2)}`;
    }

    function deshacer() {
        if(!state.last) return;
        // Restar platos
        state.last.items.forEach(i => { 
            state.acumulado[i.n] -= i.q; 
            if(state.acumulado[i.n]<=0) delete state.acumulado[i.n]; 
        });
        // Restar adicional del acumulado si hubo
        if(state.last.adi > 0) {
            state.acumulado["Adicionales"] -= state.last.adi;
            if(state.acumulado["Adicionales"] <= 0) delete state.acumulado["Adicionales"];
        }
        // Restar dinero de caja
        if(state.last.met === 'Efectivo') state.efec -= state.last.sub; 
        else state.yape -= state.last.sub;
        
        state.last = null;
        document.getElementById('undo').style.display = 'none';
        save();
    }

    init();
</script>
</body>
</html>
